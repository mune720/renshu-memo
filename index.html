<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf9f6" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="練習メモ">
<title>練習メモ</title>
<style>
:root{
  --bg:#faf9f6; --ink:#1c1c1e; --ink-soft:#8a8a8f; --line:#e6e3dc;
  --accent:#3a7a6a; --card:#ffffff; --overlay:rgba(0,0,0,.3);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1c1c1e; --ink:#f2f2f7; --ink-soft:#98989f; --line:#3a3a3c;
         --accent:#7fbfae; --card:#2c2c2e; --overlay:rgba(0,0,0,.5); }
}
*{ box-sizing:border-box; }
html{ -webkit-text-size-adjust:100%; }
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;
  touch-action:manipulation; min-height:100dvh;
}
header{
  position:sticky; top:0; z-index:10; background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:calc(8px + env(safe-area-inset-top)) 16px 8px;
}
/* タブ・セグメント */
.seg2{
  display:flex; gap:4px; background:var(--line); border-radius:11px; padding:3px;
  max-width:300px; margin:0 auto;
}
.seg2 button{
  flex:1; font:inherit; font-size:15px; font-weight:600; padding:8px 10px;
  border:0; border-radius:9px; background:transparent; color:var(--ink-soft);
  -webkit-tap-highlight-color:transparent;
}
.seg2 button.on{ background:var(--card); color:var(--ink); }
.view{ max-width:640px; width:100%; margin:0 auto; }
/* メモのツールバー */
.lessonbar{
  display:flex; align-items:center; gap:8px; padding:10px 16px 0;
  max-width:640px; margin:0 auto;
}
#lessonBtn{
  flex:1; min-width:0; text-align:left; font:inherit; font-size:14px;
  color:var(--ink); background:transparent; border:0; padding:8px 4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  -webkit-tap-highlight-color:transparent;
}
.actions{ display:flex; gap:5px; flex-shrink:0; }
.actions button, #seg button{
  font:inherit; font-size:13px; padding:8px 11px; border-radius:17px;
  border:1px solid var(--line); background:transparent; color:var(--ink-soft);
  -webkit-tap-highlight-color:transparent;
}
.actions button.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
#seg{ display:flex; justify-content:center; gap:6px; padding:10px 16px 0; }
#seg button.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
main{ padding:6px 16px 0; }
.block{ margin:0 0 1.6em; }
.time{
  display:none; font-size:11px; color:var(--ink-soft); margin-bottom:2px;
  font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
}
body.show-time .time{ display:block; }
textarea{
  display:block; width:100%; border:0; background:transparent; resize:none;
  font:inherit; font-size:17px; line-height:1.7; color:inherit;
  padding:0; outline:none; overflow:hidden;
}
textarea.resolved, .card.resolved .body{
  font-family:"Hiragino Mincho ProN","Hiragino Mincho Pro",serif;
  color:var(--ink-soft);
}
#tail{ min-height:42vh; }
/* 整理モードのカード */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:10px 12px; -webkit-tap-highlight-color:transparent;
}
body.organize .block{ margin-bottom:12px; }
.chead{ display:flex; align-items:center; gap:8px; min-height:30px; }
.chead .time{ margin:0; flex:1; }
body:not(.show-time) .chead .time{ display:block; visibility:hidden; }
.rtag{ display:none; font-size:11px; color:var(--accent); border:1px solid var(--accent);
       border-radius:9px; padding:1px 7px; flex-shrink:0; }
.card.resolved .rtag{ display:inline-block; }
.chip{
  font:inherit; font-size:13px; padding:6px 13px; border-radius:15px; flex-shrink:0;
  min-width:44px; border:1px dashed var(--line); background:transparent; color:var(--ink-soft);
  -webkit-tap-highlight-color:transparent;
}
.chip.has{ border-style:solid; border-color:var(--accent); color:var(--accent); }
.body{ white-space:pre-wrap; word-break:break-word; font-size:17px; line-height:1.7; margin-top:4px;
       -webkit-user-select:text; user-select:text; }
.ghead{ font-size:13px; font-weight:600; color:var(--ink-soft); margin:18px 0 8px; }
.ghead:first-child{ margin-top:0; }
.empty-hint{ color:var(--ink-soft); font-size:14px; text-align:center; padding:32px 16px; }
#installHint{
  display:flex; align-items:center; gap:6px; margin:10px 16px 0;
  padding:9px 8px 9px 14px; font-size:12px; color:var(--ink-soft);
  background:var(--card); border:1px solid var(--line); border-radius:10px;
}
#installHint span{ flex:1; }
#installHint button{
  font:inherit; font-size:16px; color:var(--ink-soft); background:none; border:0;
  padding:4px 12px; -webkit-tap-highlight-color:transparent;
}
/* 家計簿 */
#expenseView main{ padding-bottom:40px; }
.formcard{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:12px; margin:12px 0;
}
.amtrow{ display:flex; align-items:center; gap:8px; }
.amtrow .yen{ font-size:20px; color:var(--ink-soft); }
.amtrow #expAmount{
  flex:1; min-width:0; font:inherit; font-size:24px; font-weight:600; letter-spacing:.5px;
  border:0; border-bottom:2px solid var(--line); background:transparent; color:inherit;
  padding:4px 2px; outline:none;
}
.amtrow #expAmount:focus{ border-bottom-color:var(--accent); }
.amtrow #expDate{
  font:inherit; font-size:13px; color:var(--ink-soft); border:1px solid var(--line);
  border-radius:9px; padding:7px 8px; background:var(--bg); flex-shrink:0;
}
.chips{ display:flex; flex-wrap:wrap; gap:7px; margin:14px 0 4px; }
.chips .ec{
  font:inherit; font-size:14px; padding:8px 14px; border-radius:16px;
  border:1px solid var(--line); background:transparent; color:var(--ink);
  -webkit-tap-highlight-color:transparent;
}
.chips .ec.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
.chips .ec.edit{ color:var(--ink-soft); border-style:dashed; }
.noterow{ display:flex; gap:8px; margin-top:12px; }
.noterow #expNote{
  flex:1; min-width:0; font:inherit; font-size:15px; padding:10px 12px;
  border:1px solid var(--line); border-radius:10px; background:var(--bg); color:inherit; outline:none;
}
.noterow #expAdd{
  font:inherit; font-size:15px; font-weight:600; padding:10px 20px; border-radius:10px;
  border:1px solid var(--accent); background:var(--accent); color:#fff; flex-shrink:0;
}
.monthnav{
  display:flex; align-items:center; gap:6px; margin:6px 0 12px;
}
.monthnav button{
  font:inherit; font-size:18px; line-height:1; padding:8px 14px; border-radius:10px;
  border:1px solid var(--line); background:transparent; color:var(--ink-soft);
  -webkit-tap-highlight-color:transparent;
}
.monthnav .mlabel{ font-size:16px; font-weight:600; min-width:96px; text-align:center; }
.monthnav .mtotal{ flex:1; text-align:right; font-size:15px; font-weight:600; color:var(--accent); }
.erow{
  display:flex; align-items:center; gap:10px; padding:11px 4px;
  border-bottom:1px solid var(--line);
}
.erow .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.erow .ecat{ font-size:13px; color:var(--ink-soft); flex-shrink:0; min-width:62px; }
.erow .enote{ flex:1; min-width:0; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.erow .eamt{ font-size:15px; font-weight:600; flex-shrink:0; }
.erow .edel{
  font:inherit; font-size:18px; line-height:1; color:var(--ink-soft); background:none; border:0;
  padding:2px 6px; flex-shrink:0; -webkit-tap-highlight-color:transparent;
}
.chart-card{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:14px; margin:0 0 14px;
}
.chart-card h3{ margin:0 0 10px; font-size:14px; font-weight:600; color:var(--ink-soft); }
svg.pie{ display:block; width:150px; height:150px; margin:0 auto 6px; }
svg.bar{ display:block; width:100%; height:auto; }
svg .ax{ font-size:11px; fill:var(--ink-soft); }
svg .val{ font-size:9px; fill:var(--ink-soft); }
.legend{ margin-top:6px; }
.legend.wrap{ display:flex; flex-wrap:wrap; gap:6px 14px; }
.legend .lg{ display:flex; align-items:center; gap:8px; padding:4px 0; font-size:14px; }
.legend.wrap .lg{ font-size:12px; color:var(--ink-soft); padding:2px 0; }
.legend .dot{ width:11px; height:11px; border-radius:3px; flex-shrink:0; }
.legend .lg-cat{ flex:1; }
.legend .lg-amt small{ color:var(--ink-soft); margin-left:6px; }
/* シート */
#overlay{ position:fixed; inset:0; background:var(--overlay); z-index:20; }
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--card);
  border-radius:16px 16px 0 0; padding:14px 16px calc(18px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 24px rgba(0,0,0,.18); max-height:74vh; overflow:auto;
  max-width:640px; margin:0 auto;
}
.sheet-title{ font-size:13px; color:var(--ink-soft); margin-bottom:4px; }
.bigbtn{
  display:block; width:100%; font:inherit; font-size:16px; font-weight:600;
  padding:14px; border-radius:11px; border:1px solid var(--accent);
  background:var(--accent); color:#fff; margin-bottom:6px;
  -webkit-tap-highlight-color:transparent;
}
.row{
  display:flex; align-items:center; gap:10px; width:100%; padding:13px 4px;
  border:0; border-bottom:1px solid var(--line); background:none; color:var(--ink);
  font:inherit; font-size:16px; text-align:left;
  -webkit-tap-highlight-color:transparent;
}
.row .check{ width:20px; flex-shrink:0; color:var(--accent); font-weight:600; }
.row .label{ flex:1; min-width:0; }
.row .label small{ display:block; color:var(--ink-soft); font-size:12px; font-weight:400;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.row .del{
  font:inherit; font-size:12px; color:#c0392b; border:1px solid currentColor;
  border-radius:10px; padding:3px 10px; background:none; flex-shrink:0;
}
.row .sub{ font-size:12px; color:var(--ink-soft); flex-shrink:0; }
.row.current .label{ font-weight:600; }
.addrow{ display:flex; gap:8px; padding-top:14px; }
.addrow input{
  flex:1; font:inherit; font-size:16px; padding:9px 11px; min-width:0;
  border:1px solid var(--line); border-radius:9px; background:var(--bg); color:inherit;
}
.addrow button{
  font:inherit; font-size:14px; padding:9px 14px; border-radius:9px;
  border:1px solid var(--accent); background:var(--accent); color:#fff;
}
.toast{
  position:fixed; left:50%; transform:translateX(-50%);
  bottom:calc(28px + env(safe-area-inset-bottom));
  background:rgba(20,20,20,.82); color:#fff; padding:9px 16px; border-radius:18px;
  font-size:13px; z-index:40; opacity:0; transition:opacity .25s; pointer-events:none;
  white-space:nowrap; max-width:88vw;
}
.toast.show{ opacity:1; }
[hidden]{ display:none !important; }
</style>
</head>
<body>
<header>
  <div id="tabs" class="seg2">
    <button data-tab="memo" class="on">メモ</button>
    <button data-tab="expense">家計簿</button>
  </div>
</header>

<!-- ===== メモ ===== -->
<section id="memoView" class="view">
  <div class="lessonbar">
    <button id="lessonBtn">レッスン ▾</button>
    <div class="actions">
      <button id="btnTime">時刻</button>
      <button id="btnOrganize">整理</button>
      <button id="btnCopy">コピー</button>
    </div>
  </div>
  <div id="installHint" hidden>
    <span>共有 →「ホーム画面に追加」で使うと、データが消えにくくなります</span>
    <button id="hintClose" aria-label="閉じる">×</button>
  </div>
  <div id="seg" hidden>
    <button data-g="time" class="on">時系列</button>
    <button data-g="category">カテゴリー</button>
  </div>
  <main id="list"></main>
  <div id="tail"></div>
</section>

<!-- ===== 家計簿 ===== -->
<section id="expenseView" class="view" hidden>
  <div style="padding:10px 16px 0;">
    <div id="expSeg" class="seg2">
      <button data-e="input" class="on">入力</button>
      <button data-e="chart">グラフ</button>
    </div>
  </div>
  <main>
    <div id="expInput">
      <div class="formcard">
        <div class="amtrow">
          <span class="yen">¥</span>
          <input id="expAmount" inputmode="numeric" placeholder="金額" enterkeyhint="done">
          <input id="expDate" type="date">
        </div>
        <div id="expCats" class="chips"></div>
        <div class="noterow">
          <input id="expNote" placeholder="メモ（任意）" maxlength="40" enterkeyhint="done">
          <button id="expAdd">追加</button>
        </div>
      </div>
      <div class="monthnav">
        <button class="mprev" aria-label="前の月">‹</button>
        <span class="mlabel"></span>
        <button class="mnext" aria-label="次の月">›</button>
        <span class="mtotal"></span>
      </div>
      <div id="expList"></div>
    </div>
    <div id="expChart" hidden>
      <div class="monthnav">
        <button class="mprev" aria-label="前の月">‹</button>
        <span class="mlabel"></span>
        <button class="mnext" aria-label="次の月">›</button>
      </div>
      <div class="chart-card"><h3>区分別（この月）</h3><div id="chartPie"></div></div>
      <div class="chart-card"><h3>月ごとの支出</h3><div id="chartBar"></div></div>
      <div class="chart-card"><h3>区分別の月推移</h3><div id="chartStacked"></div></div>
    </div>
  </main>
</section>

<div id="overlay" hidden></div>

<!-- メモのカテゴリー選択 -->
<div id="picker" class="sheet" hidden>
  <div class="sheet-title">カテゴリー</div>
  <div id="catList"></div>
  <div class="addrow">
    <input id="newCat" placeholder="新しいカテゴリー" maxlength="20" enterkeyhint="done">
    <button id="addCat">追加</button>
  </div>
</div>

<!-- レッスン履歴 -->
<div id="lessonSheet" class="sheet" hidden>
  <button id="newLessonBtn" class="bigbtn">＋ 新しいレッスンを始める</button>
  <div class="sheet-title">これまでのレッスン</div>
  <div id="lessonList"></div>
</div>

<!-- 家計簿の区分編集 -->
<div id="expCatSheet" class="sheet" hidden>
  <div class="sheet-title">区分の編集</div>
  <div id="expCatList"></div>
  <div class="addrow">
    <input id="newExpCat" placeholder="新しい区分" maxlength="12" enterkeyhint="done">
    <button id="addExpCat">追加</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';
const LS_KEY = 'renshu-memo-v1';
const DEFAULT_EXP_CATS = ['食費','交通費','学会費','楽譜・教材','レッスン費','日用品','交際費','その他'];
const PALETTE = ['#3a7a6a','#c98a3a','#6a8cc9','#b05a7a','#7aa84a','#9a6ac9','#c95a5a','#5ab0a0','#a0925a','#8a8a8f'];

const $ = s => document.querySelector(s);
const el = (tag, cls) => { const n = document.createElement(tag); if (cls) n.className = cls; return n; };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const pad = n => String(n).padStart(2, '0');
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtYen = n => String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const fmtYenShort = n => n >= 10000 ? (n/10000).toFixed(n % 10000 ? 1 : 0) + '万' : fmtYen(n);

let mode = 'edit';          // 'edit' | 'organize'
let groupBy = 'time';       // 'time' | 'category'
let view = 'memo';          // 'memo' | 'expense'
let expSub = 'input';       // 'input' | 'chart'
let composing = false;
let corruptBackup = false;
const now0 = new Date();
let expMonth = { y: now0.getFullYear(), m: now0.getMonth() + 1 };

/* ---------- データ ---------- */
function newLessonObj(){ return { id: uid(), createdAt: Date.now(), blocks: [] }; }
function normBlock(b){
  return { id: b.id || uid(), text: b.text || '', createdAt: b.createdAt || null,
           resolved: !!b.resolved, category: b.category || null };
}
function normLesson(l){
  if (!l || !Array.isArray(l.blocks)) return null;
  return { id: l.id || uid(), createdAt: l.createdAt || Date.now(),
           blocks: l.blocks.filter(b => (b.text || '').trim() !== '').map(normBlock) };
}
function normEntry(e){
  const amount = Math.round(+e.amount);
  if (!amount || amount <= 0 || !e.date) return null;
  return { id: e.id || uid(), date: String(e.date), amount,
           category: e.category || 'その他', note: e.note || '', createdAt: e.createdAt || Date.now() };
}
function normExpense(d){
  return {
    entries: (d && Array.isArray(d.entries)) ? d.entries.map(normEntry).filter(Boolean) : [],
    categories: (d && Array.isArray(d.categories) && d.categories.length) ? d.categories.slice() : DEFAULT_EXP_CATS.slice(),
  };
}
function fresh(){
  const l = newLessonObj();
  return { lessons: [l], activeLessonId: l.id, categories: [], showTime: false, expense: normExpense(null) };
}
function load(){
  let raw = null;
  try{
    raw = localStorage.getItem(LS_KEY);
    if (raw == null) return fresh();
    const d = JSON.parse(raw);
    if (d && Array.isArray(d.lessons)){            // v2
      const lessons = d.lessons.map(normLesson).filter(Boolean);
      const st = {
        lessons, activeLessonId: d.activeLessonId,
        categories: Array.isArray(d.categories) ? d.categories : [],
        showTime: !!d.showTime, expense: normExpense(d.expense),
      };
      if (!lessons.length){ const l = newLessonObj(); lessons.push(l); st.activeLessonId = l.id; }
      if (!lessons.find(l => l.id === st.activeLessonId)) st.activeLessonId = lessons[lessons.length - 1].id;
      return st;
    }
    if (d && Array.isArray(d.blocks)){             // v1 → 1レッスンに移行
      const blocks = d.blocks.filter(b => (b.text || '').trim() !== '').map(normBlock);
      const createdAt = blocks.reduce((m, b) => (b.createdAt && (!m || b.createdAt < m)) ? b.createdAt : m, null) || Date.now();
      const l = { id: uid(), createdAt, blocks };
      return { lessons: [l], activeLessonId: l.id,
               categories: Array.isArray(d.categories) ? d.categories : [],
               showTime: !!d.showTime, expense: normExpense(null) };
    }
    throw new Error('invalid shape');
  }catch(e){
    if (raw){ try{ localStorage.setItem(LS_KEY + '-corrupt', raw); corruptBackup = true; }catch(e2){} }
    return fresh();
  }
}

let state = load();

function cur(){
  let l = state.lessons.find(x => x.id === state.activeLessonId);
  if (!l) l = state.lessons[state.lessons.length - 1];
  if (!l){ l = newLessonObj(); state.lessons.push(l); state.activeLessonId = l.id; }
  return l;
}

let saveTimer = null;
function save(){ clearTimeout(saveTimer); saveTimer = setTimeout(persist, 250); }
function serialize(){
  const lessons = state.lessons.map(l => ({
    id: l.id, createdAt: l.createdAt,
    blocks: l.blocks.filter(b => b.text.trim() !== ''),
  })).filter(l => l.blocks.length > 0 || l.id === state.activeLessonId);
  return JSON.stringify({
    v: 2, lessons, activeLessonId: state.activeLessonId,
    categories: state.categories, showTime: state.showTime,
    expense: { entries: state.expense.entries, categories: state.expense.categories },
  });
}
function persist(){
  clearTimeout(saveTimer); saveTimer = null;
  try{ localStorage.setItem(LS_KEY, serialize()); }
  catch(e){ toast('保存に失敗しました（空き容量を確認してください）'); }
}
function syncFromStorage(){
  if (saveTimer) return;
  const ae = document.activeElement;
  if (ae && (ae.tagName === 'TEXTAREA' || ae.tagName === 'INPUT')) return;
  let raw = null;
  try{ raw = localStorage.getItem(LS_KEY); }catch(e){ return; }
  if (raw == null || raw === serialize()) return;
  state = load();
  renderAll();
}
addEventListener('pagehide', persist);
addEventListener('storage', e => { if (e.key === LS_KEY) syncFromStorage(); });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') persist();
  else syncFromStorage();
});

/* ---------- 時刻フォーマット ---------- */
function fmtDay(t){
  const d = new Date(t), n = new Date();
  const wd = '日月火水木金土'[d.getDay()];
  const y = d.getFullYear() !== n.getFullYear() ? d.getFullYear() + '年' : '';
  return `${y}${d.getMonth()+1}月${d.getDate()}日(${wd})`;
}
function fmtTime(t){
  const d = new Date(t);
  return `${fmtDay(t)} ${d.getHours()}:${pad(d.getMinutes())}`;
}
function newBlock(text, src){

           resolved: src ? !!src.resolved : false, category: src ? src.category : null };

function timeNode(b){
  const t = el('div', 'time');
  t.textContent = b.createdAt ? fmtTime(b.createdAt) : '';
  return t;
}

function makeEditBlock(b){
  const blocks = cur().blocks;
  const wrap = el('div', 'block');
  wrap.dataset.id = b.id;
  wrap.appendChild(timeNode(b));
  const ta = document.createElement('textarea');
  ta.value = b.text; ta.rows = 1; ta.dataset.id = b.id; ta.autocapitalize = 'off';
  if (blocks.length === 1 && !b.text) ta.placeholder = '気付きをメモ…（改行2つで区切り）';
  if (b.resolved) ta.classList.add('resolved');
  ta.addEventListener('compositionstart', () => { composing = true; });
  ta.addEventListener('compositionend', () => { composing = false; onInput(b, ta); });
  ta.addEventListener('input', () => {
    fit(ta);
    if (composing){ b.text = ta.value; save(); return; }
    onInput(b, ta);
  });
  ta.addEventListener('keydown', e => onKeydown(e, b, ta));
  wrap.appendChild(ta);
  return wrap;
}
function fit(ta){ ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
function fitAll(){ document.querySelectorAll('#list textarea').forEach(fit); }

function onInput(b, ta){
  b.text = ta.value;
  if (!b.createdAt && b.text.trim()){
    b.createdAt = Date.now();
    const t = ta.parentElement.querySelector('.time');
    if (t) t.textContent = fmtTime(b.createdAt);
  }
  if (/\n[ \t　]*\n/.test(b.text)){ splitBlock(b, ta); return; }
  save();
}
function splitParts(value){
  const re = /\n[ \t　]*(?:\n[ \t　]*)+/g;
  const parts = []; let last = 0, m;
  while ((m = re.exec(value))){ parts.push({ text: value.slice(last, m.index), start: last }); last = re.lastIndex; }
  parts.push({ text: value.slice(last), start: last });
  return parts;
}
function splitBlock(b, ta){
  const blocks = cur().blocks;
  const caret = ta.selectionStart;
  const parts = splitParts(ta.value);
  let focusIdx = parts.length - 1, focusOff = 0;
  for (let i = 0; i < parts.length; i++){
    const p = parts[i];
    if (caret <= p.start + p.text.length){ focusIdx = i; focusOff = Math.max(0, caret - p.start); break; }
  }
  const idx = blocks.indexOf(b);
  if (idx < 0) return;
  b.text = parts[0].text;
  const added = parts.slice(1).map(p => newBlock(p.text));
  blocks.splice(idx + 1, 0, ...added);

  ta.value = b.text; fit(ta);
  let after = ta.closest('.block');
  const newEls = added.map(nb => { const e = makeEditBlock(nb); after.insertAdjacentElement('afterend', e); after = e; return e; });
  newEls.forEach(e => fit(e.querySelector('textarea')));

  const target = focusIdx === 0 ? ta : newEls[focusIdx - 1].querySelector('textarea');
  target.focus(); target.setSelectionRange(focusOff, focusOff);
  requestAnimationFrame(() => { target.setSelectionRange(focusOff, focusOff); target.scrollIntoView({ block: 'nearest' }); });
  save();
}
function onKeydown(e, b, ta){
  if (e.key !== 'Backspace' || composing || e.isComposing) return;
  if (ta.selectionStart !== 0 || ta.selectionEnd !== 0) return;
  const blocks = cur().blocks;
  const idx = blocks.indexOf(b);
  if (idx <= 0) return;
  e.preventDefault();
  const prev = blocks[idx - 1];
  const join = prev.text ? prev.text + '\n' : '';
  const newCaret = join.length;
  prev.text = join + b.text;
  if (!prev.createdAt && prev.text.trim()) prev.createdAt = b.createdAt || Date.now();
  blocks.splice(idx, 1);
  const prevTa = document.querySelector(`textarea[data-id="${prev.id}"]`);
  ta.closest('.block').remove();
  if (prevTa){
    prevTa.value = prev.text; fit(prevTa);
    prevTa.focus(); prevTa.setSelectionRange(newCaret, newCaret);
    requestAnimationFrame(() => { prevTa.setSelectionRange(newCaret, newCaret); prevTa.scrollIntoView({ block: 'nearest' }); });
  }
  save();
}
$('#tail').addEventListener('click', () => {
  if (mode !== 'edit') return;
  const blocks = cur().blocks;
  let b = blocks[blocks.length - 1];
  if (!b || b.text.trim() !== ''){ b = newBlock(''); blocks.push(b); $('#list').appendChild(makeEditBlock(b)); }
  const ta = document.querySelector(`textarea[data-id="${b.id}"]`);

function makeCard(b){

/* ---------- グラフ（SVG） ---------- */
function renderCharts(){ renderPie($('#chartPie')); renderBar($('#chartBar')); renderStacked($('#chartStacked')); }
function renderPie(c){
  const map = {}; monthEntries().forEach(e => map[e.category] = (map[e.category] || 0) + e.amount);
  const data = Object.keys(map).map(k => ({ cat: k, amount: map[k] })).sort((a, b) => b.amount - a.amount);
  const total = data.reduce((s, d) => s + d.amount, 0);
  if (!total){ c.innerHTML = '<div class="empty-hint">この月の支出はまだありません</div>'; return; }
  const cx = 90, cy = 90, r = 80; let ang = -Math.PI / 2, paths = '';
  if (data.length === 1){
    paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${catColor(data[0].cat)}"/>`;
  } else {
    data.forEach(d => {
      const frac = d.amount / total, a2 = ang + frac * 2 * Math.PI;
      const x1 = cx + r * Math.cos(ang), y1 = cy + r * Math.sin(ang);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      const large = frac > 0.5 ? 1 : 0;
      paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${catColor(d.cat)}"/>`;
      ang = a2;
    });
  }
  const legend = data.map(d => `<div class="lg"><span class="dot" style="background:${catColor(d.cat)}"></span><span class="lg-cat">${esc(d.cat)}</span><span class="lg-amt">¥${fmtYen(d.amount)}<small>${Math.round(d.amount/total*100)}%</small></span></div>`).join('');
  c.innerHTML = `<svg class="pie" viewBox="0 0 180 180">${paths}</svg><div class="legend">${legend}</div>`;
}
function renderBar(c){
  const months = lastMonths(6), totals = months.map(m => monthTotal(m.key));
  const max = Math.max(1, ...totals);
  if (!totals.some(t => t > 0)){ c.innerHTML = '<div class="empty-hint">データがありません</div>'; return; }
  const W = 320, H = 170, padX = 22, bw = 30, gap = (W - padX * 2 - bw * 6) / 5, base = H - 28;
  let g = '';
  months.forEach((m, i) => {
    const x = padX + i * (bw + gap), h = (totals[i] / max) * (base - 22), y = base - h;
    const isCur = m.key === curYM();
    g += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="4" fill="${isCur ? 'var(--accent)' : 'var(--line)'}"/>`;
    g += `<text class="ax" x="${(x+bw/2).toFixed(1)}" y="${H-10}" text-anchor="middle">${m.label}</text>`;
    if (totals[i] > 0) g += `<text class="val" x="${(x+bw/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle">${fmtYenShort(totals[i])}</text>`;
  });
  c.innerHTML = `<svg class="bar" viewBox="0 0 ${W} ${H}">${g}</svg>`;
}
function renderStacked(c){
  const months = lastMonths(6);
  const cats = state.expense.categories.filter(cat => state.expense.entries.some(e => e.category === cat));
  const totals = months.map(m => monthTotal(m.key)), max = Math.max(1, ...totals);
  if (!cats.length){ c.innerHTML = '<div class="empty-hint">データがありません</div>'; return; }
  const W = 320, H = 175, padX = 22, bw = 30, gap = (W - padX * 2 - bw * 6) / 5, base = H - 28;
  let g = '';
  months.forEach((m, i) => {
    const x = padX + i * (bw + gap); let yTop = base;
    cats.forEach(cat => {
      const amt = state.expense.entries.filter(e => e.date.slice(0, 7) === m.key && e.category === cat).reduce((s, e) => s + e.amount, 0);
      if (!amt) return;
      const h = (amt / max) * (base - 22); yTop -= h;
      g += `<rect x="${x.toFixed(1)}" y="${yTop.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" fill="${catColor(cat)}"/>`;
    });
    g += `<text class="ax" x="${(x+bw/2).toFixed(1)}" y="${H-10}" text-anchor="middle">${m.label}</text>`;
  });
  const legend = cats.map(cat => `<div class="lg"><span class="dot" style="background:${catColor(cat)}"></span><span class="lg-cat">${esc(cat)}</span></div>`).join('');
  c.innerHTML = `<svg class="bar" viewBox="0 0 ${W} ${H}">${g}</svg><div class="legend wrap">${legend}</div>`;
}

/* ===================== 共通 ===================== */
function openSheet(sel){ $('#overlay').hidden = false; $(sel).hidden = false; }
function closeSheets(){
  $('#overlay').hidden = true;
  ['#picker', '#lessonSheet', '#expCatSheet'].forEach(s => $(s).hidden = true);
  pickerTarget = null;
}
$('#overlay').addEventListener('click', closeSheets);

document.querySelectorAll('#tabs button').forEach(b => b.addEventListener('click', () => setView(b.dataset.tab)));
function setView(v){
  view = v;
  $('#memoView').hidden = v !== 'memo';
  $('#expenseView').hidden = v !== 'expense';
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('on', b.dataset.tab === v));
  if (v === 'expense') renderExpense(); else render();
}

let toastTimer = null;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ---------- 起動 ---------- */
render();
requestAnimationFrame(() => { fitAll(); });
addEventListener('resize', fitAll);
if (corruptBackup) toast('以前のデータを読み込めなかったため退避しました');

if (window.visualViewport){
  const vv = window.visualViewport;
  const adjustKb = () => {
    const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
    document.body.style.paddingBottom = kb > 0 ? kb + 'px' : '';
  };
  vv.addEventListener('resize', adjustKb);
  vv.addEventListener('scroll', adjustKb);
}

(() => {
  const standalone = navigator.standalone === true ||
    (window.matchMedia && matchMedia('(display-mode: standalone)').matches);
  let dismissed = false;
  try{ dismissed = !!localStorage.getItem(LS_KEY + '-hint-done'); }catch(e){}
  if (!standalone && !dismissed){
    $('#installHint').hidden = false;
    $('#hintClose').addEventListener('click', () => {
      $('#installHint').hidden = true;
      try{ localStorage.setItem(LS_KEY + '-hint-done', '1'); }catch(e){}
    });
  }
})();

if ('serviceWorker' in navigator){
  addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
